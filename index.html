<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vaibhav Singh Soun | DevOps Engineer</title>

<style>
:root {
  --bg: #0a0e0f;
  --green: #00ff9d;
  --cyan: #00d4ff;
  --text: #c8d8da;
}

body {
  margin: 0;
  font-family: monospace;
  background: var(--bg);
  color: var(--text);
}

/* HERO */
#hero {
  min-height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 80px 5%;
  gap: 2rem;
}

/* LEFT SIDE */
.hero-inner {
  max-width: 550px;
}

.hero-name {
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: bold;
  color: white;
}

.hero-name span {
  color: var(--green);
}

.hero-title {
  color: var(--cyan);
  margin: 10px 0 20px;
}

button {
  padding: 10px 20px;
  background: var(--green);
  border: none;
  cursor: pointer;
}

/* RIGHT TERMINAL */
.hero-terminal {
  width: 350px;
  background: #111;
  border: 1px solid #333;
  padding: 15px;
  border-radius: 6px;
}

.terminal-line {
  margin-bottom: 6px;
}

.green { color: var(--green); }

/* MOBILE */
@media(max-width:768px){
  #hero {
    flex-direction: column;
  }

  .hero-terminal {
    width: 100%;
  }
}
</style>
</head>

<body>

<section id="hero">

  <div class="hero-inner">
    <h1 class="hero-name">
      Vaibhav <br><span>Singh Soun</span>
    </h1>

    <p class="hero-title">DevOps Engineer</p>

    <button>View Projects</button>
  </div>

  <div class="hero-terminal">
    <div class="terminal-line"><span class="green">$</span> kubectl get pods</div>
    <div class="terminal-line">✔ All running</div>
    <div class="terminal-line"><span class="green">$</span> docker ps</div>
    <div class="terminal-line">3 containers active</div>
  </div>

</section>

</body>
</html>
